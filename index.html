            { id: 1776326031515, title: "奶油草莓", category: "fresh", imageType: "人物写实", image: "https://cdn.jsdelivr.net/gh/philipliu2/images/img/lALPM3DiBBvBEbHNBaDNBDg_1080_1440.png", imageWidth: 1080, imageHeight: 1440, source: "jiamin", industry: "", clickRate: "4.4%", rating: 3, likes: 1, likedByMe: true, tags: ["\u65e5\u7cfb\u6781\u7b80", "\u7f8e\u98df\u6444\u5f71", "\u8349\u8393\u7279\u5199", "\u6e05\u65b0\u6d77\u62a5", "\u7535\u5546\u8bbe\u8ba1", "\u81ea\u7136\u5149\u611f", "\u5fae\u8ddd\u7ec6\u8282", "\u98df\u6b32\u8bf1\u60d1"], text: "风格： 一张高端食品电商海报，极简且清新的日系平面设计风格，具有极高的食欲感。 构图： 俯视视角的微距摄影，四颗草莓不规则地排列在画面中上部，两颗完整，两颗切半。 主体： 两颗饱满鲜红的奶油草莓，带有鲜绿的叶柄和叶子。另外两颗切半的草莓展示红白相间的果肉和细腻的内部纹理。所有草莓表面和切面都覆盖着剔透的小水珠。 场景背景： 一张带有清晰木纹的白色做旧木板桌，水珠也撒落其上。 色彩： 鲜艳的草莓红、鲜明的叶柄绿和做旧木板的米白色。 光线： 明亮的自然日光从侧面照射，在木纹上投下清晰、柔和的阴影，强调草莓表面的凹凸细节。 文字层级： [左上角]：酸甜多汁，奶味十足（小字、深灰色粗体） [右上角，主标题]：奶油草莓（超大字、黑色粗体、广告字体） [右上角，副标题]：产自露天果园，充足日照，18°（小字、深灰色） [底部左侧]：Fresh Strawberry（中等字、英文、黑色粗体） [底部]：活动时间：06.01→08.31（小字、横排） [底部右侧]：@码歌鲜果（小字） [底部最左]：带圈的“鲜”字图标（小图标） 细节与质量： 超高清分辨率（UHD），丰富的纹理细节，对焦清晰，自然的摄影风格。", textOptimized: "高端食品电商海报，日系极简清新平面设计，高食欲感。俯视微距摄影，四颗草莓不规则排列于画面上部，两颗完整，两颗切半。饱满鲜红的奶油草莓带鲜绿叶柄与叶，切半草莓展示红白果肉与细腻纹理。草莓表面与切面覆盖剔透水珠。背景为带清晰木纹的白色做旧木板桌，散落水珠。色彩：鲜艳草莓红、鲜明叶柄绿、米白做旧木板。明亮自然侧光，木纹投下清晰柔和阴影，突出草莓表面凹凸细节。文字：左上角“酸甜多汁，奶味十足”（小字、深灰粗体）；右上角主标题“奶油草莓”（超大、黑粗、广告字体），副标题“产自露天果园，充足日照，18°”（小字、深灰）；底部左侧“Fresh Strawberry”（中字、英文、黑粗）；底部“活动时间：06.01→08.31”（小字、横排）；底部右侧“@码歌鲜果”（小字）；底部最左带圈“鲜”字图标。超高清分辨率，丰富纹理，对焦清晰，自然摄影风格。", createdAt: 1776326031515 },

            { id: 1776322763245, title: "小白养虾", category: "active", imageType: "海报图", image: "https://cdn.jsdelivr.net/gh/philipliu2/images/img/lALPM2T7NXNAYDnNCTzNBu0_1773_2364.png", imageWidth: 1773, imageHeight: 2364, source: "shunyu", industry: "科技", clickRate: "8.5%", rating: 3, likes: 0, likedByMe: false, tags: ["\u5c0f\u7ea2\u4e66\u98ce\u683c", "3D\u5361\u901a", "\u62df\u4eba\u5316\u5c0f\u9f99\u867e", "Q\u7248\u53ef\u7231", "\u5546\u4e1a\u6d77\u62a5", "\u6e05\u65b0\u6696\u8272\u8c03", "\u79d1\u6280\u840c\u611f", "\u7ad6\u7248\u6784\u56fe"], text: "小红书风格商业宣传海报，3D卡通风格，主体是一只可爱的拟人化红色小龙虾，圆滚滚的造型，大大的钳子，黑白分明的大眼睛，软萌Q版，3D渲染，质感细腻，光影柔和。 背景是渐变浅粉色到米白色的清新暖调，干净通透，无多余杂物。 画面上方是醒目的大标题：「小白养虾·3分钟搞定」，加粗黑体，黑色，视觉冲击力强； 副标题1：「零代码免配置·一键平台适配」，副标题2：「输入一句话指令·解锁专属龙虾AI」，字体清晰，排版工整，层级分明。 画面中围绕小龙虾分布多个3D悬浮元素 整体风格：明亮活泼，治愈可爱，科技感与萌感结合，适合小红书平台，3:4竖版构图，高分辨率，细节丰富，色彩鲜艳和谐。", textOptimized: "小红书风格商业海报，3D卡通渲染，拟人化红色小龙虾，Q版软萌造型，圆润身体，大钳子，黑白大眼睛，质感细腻，光影柔和。背景为浅粉至米白渐变，干净通透。上方大标题「小白养虾·3分钟搞定」，粗黑体，视觉冲击强；副标题「零代码免配置·一键平台适配」与「输入一句话指令·解锁专属龙虾AI」，字体清晰，排版工整。画面点缀3D悬浮元素，整体明亮活泼，治愈可爱，兼具科技感与萌趣，竖版3:4构图，高分辨率，色彩鲜艳和谐。", createdAt: 1776322763245 },
            { id: 1776322564855, title: "肾脏小知识", category: "professional", imageType: "信息图", image: "https://cdn.jsdelivr.net/gh/philipliu2/images/img/lALPD2T2GilNmTHNBN3NA6s_939_1245.png", imageWidth: 939, imageHeight: 1245, source: "wenqi", industry: "医美", clickRate: "4.6%", rating: 4, likes: 0, likedByMe: false, tags: ["\u80be\u810f\u5065\u5eb7", "\u5361\u901a\u5ba3\u6559", "\u6e29\u99a8\u58c1\u62a5", "\u62a4\u80be\u5c0f\u77e5\u8bc6", "\u53ef\u7231\u79d1\u666e", "\u5927\u5b57\u6e05\u6670", "\u75c5\u4eba\u53cb\u597d", "\u6253\u5370\u5373\u7528"], text: "A4竖版、卡通可爱、病人一看就懂、大字清晰、适合贴墙上 的肾脏宣教壁报，复制就能打印，超温馨不吓人～ 肾脏小知识 可爱宣教壁报 （A4竖版｜卡通温柔风） 🌟 认识我们的“身体小卫士”——肾脏 我们有 两个肾脏，长得像一对可爱的小蚕豆， 住在后腰两侧，**24小时不停帮身体“大扫除”**～ 🧠 肾脏里面长啥样？（简单卡通版） 从外到内分 3 层： 肾皮质（外层） 肾脏的“小工厂”，负责过滤血液 肾髓质（内层） 像小扇子一样，回收有用的水分和营养 肾盂（出口） 收集尿液，送到膀胱，排出体外 👷 肾脏最小的“小工人”：肾单位 每个肾脏有 100多万个 肾单位，超勤劳！ 肾小球：像小筛子，过滤血液、清垃圾 肾小管：像小管道，留住营养、排废水 一句话记住： 肾小球滤一滤，肾小管收一收，最后变成尿～ 💖 肾脏的 4 个超能力 净化血液 —— 清除身体毒素 排水消肿 —— 不浮肿、不憋气 调节血压 —— 保护心脏 帮忙造血 —— 让人有精神、不乏力 🌼 简单护肾小口诀 多喝水，不憋尿 少吃盐，控糖压 不乱吃药，不熬夜 定期检查，护好肾 🌸 温馨小标语 爱护肾脏，身体健康 好好治疗，天天开心", textOptimized: "A4竖版，卡通可爱，温馨不吓人，肾脏宣教壁报，大字清晰，适合贴墙打印。内容：认识肾脏，外形像小蚕豆，24小时过滤血液。肾脏结构：肾皮质、肾髓质、肾盂。肾单位：肾小球过滤，肾小管回收。肾脏功能：净化血液、排水消肿、调节血压、帮助造血。护肾口诀：多喝水、少吃盐、不乱吃药、定期检查。温馨标语：爱护肾脏，身体健康。", createdAt: 1776322564855 },

            { id: 1776321764694, title: "中国油纸伞艺术", category: "professional", imageType: "信息图", image: "https://cdn.jsdelivr.net/gh/philipliu2/images/img/lALPM1_echSA9NXNBMLNA5Y_918_1218.png", imageWidth: 918, imageHeight: 1218, source: "wenqi", industry: "旅游", clickRate: "4.6%", rating: 4, likes: 0, likedByMe: false, tags: ["\u56fd\u98ce\u4fe1\u606f\u53ef\u89c6\u5316", "\u975e\u9057\u6587\u5316\u56fe\u89e3", "\u590d\u53e4\u5de5\u7b14\u63d2\u753b", "\u9ad8\u5bc6\u5ea6\u4fe1\u606f\u8bbe\u8ba1", "\u4e1c\u65b9\u7f8e\u5b66\u5c55\u677f", "\u6cb9\u7eb8\u4f1e\u827a\u672f\u5168\u89e3", "\u4f20\u7edf\u5de5\u827a\u8be6\u89e3", "\u5b66\u672f\u7ea7\u89c6\u89c9\u8bbe\u8ba1"], text: "A3竖版信息可视化展板，主题《中国油纸伞艺术·国家级非物质文化遗产全解》，复古国风工笔图解风格，精致细腻，高信息密度，兼具学术专业性与东方传统美学，版面简洁规整、视觉层级清晰、构图均衡协调，无AI畸形、无文字乱码、无元素错乱。   基底为米白色洒金宣纸质感，搭配浅金色细描边与模块分隔框；主色为石青蓝、青竹色，点缀朱砂红，氛围温润素雅、古朴高贵。文字为规范简体中文，清晰无重叠模糊；标题用书法宋体，正文用传统印刷宋体，图文适配严谨。   顶部通栏主视觉区展示核心标题与副标题，中心为完整展开的彩绘油纸伞工笔画，伞面纹样精细，背景为淡墨山水与浅金祥云，不喧宾夺主。   左侧为历史发展与文化内核，梳理东汉至近现代发展脉络，阐释天圆地方、天人合一审美与谐音吉祥寓意，配朝代时间轴与寓意图解。右侧为艺术特征与技法，介绍竹、纸、桐油等材料，劈刀、油刷等工具及穿斗、湿裱、油饰等核心工艺，配材料工具线描与技法流程示意图。   中部通栏为地域流派与品类体系，介绍礼制官伞、民间日用伞、文人雅玩伞、外销工艺伞四大品类，及余杭、泸州、福州、婺源、益阳五大流派，配地图分布与伞型对比插画。   左下为传统题材与文化符号，展示龙凤、四君子、暗八仙、五福捧寿等经典纹样寓意，配工笔线描拆解图。右下为制作工序与非遗传承，详解选竹、制骨、裱纸、刷油、阴干等全流程，呈现师徒传承与文创活化，配工序分步图与匠人制伞场景。   底部通栏为综合图解，分五单元展示核心组件、纹样解构、工艺流程、应用场景与文化共生逻辑，工笔淡彩统一，线条流畅柔和，质感温润。", textOptimized: "A3竖版信息可视化展板，主题《中国油纸伞艺术·国家级非物质文化遗产全解》，复古国风工笔图解风格，精致细腻，高信息密度，兼具学术性与东方美学，版面简洁规整、视觉层级清晰、构图均衡协调，无AI畸形、无文字乱码、无元素错乱。  基底为米白色洒金宣纸质感，搭配浅金色细描边与模块分隔框；主色为石青蓝、青竹色，点缀朱砂红，氛围温润素雅、古朴高贵。文字为规范简体中文，清晰无重叠模糊；标题用书法宋体，正文用传统印刷宋体，图文适配严谨。  顶部通栏主视觉区展示核心标题与副标题，中心为完整展开的彩绘油纸伞工笔画，伞面纹样精细，背景为淡墨山水与浅金祥云。  左侧为历史发展与文化内核，梳理东汉至近现代发展脉络，阐释天圆地方、天人合一审美与谐音吉祥寓意，配朝代时间轴与寓意图解。  右侧为艺术特征与技法，介绍竹、纸、桐油等材料，劈刀、油刷等工具及穿斗、湿裱、油饰等核心工艺，配材料工具线描与技法流程示意图。  中部通栏为地域流派与品类体系，介绍礼制官伞、民间日用伞、文人雅玩伞、外销工艺伞四大品类，及余杭、泸州、福州、婺源、益阳五大流派，配地图分布与伞型对比插画。  左下为传统题材与文化符号，展示龙凤、四君子、暗八仙、五福捧寿等经典纹样寓意，配工笔线描拆解图。  右下为制作工序与非遗传承，详解选竹、制骨、裱纸、刷油、阴干等全流程，呈现师徒传承与文创活化，配工序分步图与匠人制伞场景。  底部通栏为综合图解，分五单元展示核心组件、纹样解构、工艺流程、应用场景与文化共生逻辑，工笔淡彩统一，线条流畅柔和，         let prompts = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let editingId = null;
        let currentDetailId = null;

        function loadPrompts() {
            const stored = localStorage.getItem('promptworld_prompts');
            const likesStored = localStorage.getItem('promptworld_likes') || '{}';
            const likesMap = JSON.parse(likesStored);
            if (stored) {
                prompts = JSON.parse(stored).map(p => ({
                    ...p,
                    likedByMe: likesMap[p.id] || false,
                    likes: p.likes || 0
                }));
            } else {
                prompts = SAMPLE_PROMPTS.map(p => ({...p, likedByMe: false}));
                savePrompts();
            }
        }

        function savePrompts() {
            localStorage.setItem('promptworld_prompts', JSON.stringify(prompts));
            const likesMap = {};
            prompts.forEach(p => { if (p.likedByMe) likesMap[p.id] = true; });
            localStorage.setItem('promptworld_likes', JSON.stringify(likesMap));
            updateStats();
        }

        function updateStats() {
            document.getElementById('promptCount').textContent = prompts.length;
            document.getElementById('totalLikes').textContent = prompts.reduce((sum, p) => sum + (p.likes || 0), 0);
        }

        function renderStars(rating, size = 10) {
            let s = '';
            for (let i = 1; i <= 5; i++) {
                s += `<i data-lucide="star" style="width:${size}px;height:${size}px;${i <= rating ? 'fill:#FBBF24;' : 'color:var(--border);'}"></i>`;
            }
            return s;
        }

        function renderPrompts() {
            const grid = document.getElementById('promptGrid');
            const empty = document.getElementById('emptyState');

            const filtered = prompts.filter(p => {
                const matchFilter = currentFilter === 'all' || p.category === currentFilter;
                const q = searchQuery.toLowerCase();
                const matchSearch = !q ||
                    p.title.toLowerCase().includes(q) ||
                    (p.tags && p.tags.some(t => t.toLowerCase().includes(q))) ||
                    (p.industry && p.industry.toLowerCase().includes(q)) ||
                    (p.source && p.source.toLowerCase().includes(q)) ||
                    (p.imageType && p.imageType.toLowerCase().includes(q));
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.add('show');
                return;
            }
            empty.classList.remove('show');

            grid.innerHTML = filtered.map(p => {
                const imgHeight = Math.round((p.imageHeight / p.imageWidth) * 280);
                return `
                <article class="prompt-card" data-id="${p.id}">
                    <img class="card-image" src="${p.image}" alt="${p.title}"
                         onerror="this.src='https://picsum.photos/280/${imgHeight}?grayscale'" style="height:${imgHeight}px;object-fit:cover;">

                        <div class="card-title-row">

        function exportPromptsForCode() {
            const esc = s => String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, ' ');
            const lines = prompts.map(p => {
                const parts = [];
                parts.push(`id: ${p.id}`);
                parts.push(`title: "${esc(p.title)}"`);
                parts.push(`category: "${esc(p.category)}"`);
                parts.push(`imageType: "${esc(p.imageType)}"`);
                parts.push(`image: "${esc(p.image)}"`);
                parts.push(`imageWidth: ${p.imageWidth || 800}`);
                parts.push(`imageHeight: ${p.imageHeight || 600}`);
                parts.push(`source: "${esc(p.source)}"`);
                parts.push(`industry: "${esc(p.industry)}"`);
                parts.push(`clickRate: "${esc(p.clickRate)}"`);
                parts.push(`rating: ${p.rating || 0}`);
                parts.push(`likes: ${p.likes || 0}`);
                parts.push(`likedByMe: ${p.likedByMe ? 'true' : 'false'}`);
                parts.push(`tags: ${JSON.stringify(p.tags || [])}`);
                parts.push(`text: "${esc(p.text)}"`);
                parts.push(`textOptimized: "${esc(p.textOptimized)}"`);
                if (p.createdAt) parts.push(`createdAt: ${p.createdAt}`);
                return '{ ' + parts.join(', ') + ' }';
            });
            const arrStr = 'const SAMPLE_PROMPTS = [\n            ' + lines.join(',\n            ') + '\n        ];';
            navigator.clipboard.writeText(arrStr).then(() => {
                showToast('已复制 ' + prompts.length + ' 个提示词到剪贴板');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }

        // Image upload handling
        function setupImageUpload(inputId, urlId, areaId) {
            const input = document.getElementById(inputId);
            const urlInput = document.getElementById(urlId);
            const area = document.getElementById(areaId);

            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    urlInput.value = ev.target.result;
                    area.innerHTML = `<img src="${ev.target.result}" alt="">`;
                    area.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            });

            urlInput.addEventListener('input', () => {
                if (urlInput.value) {
                    area.innerHTML = `<img src="${urlInput.value}" alt="" onerror="this.parentElement.classList.remove('has-image')">`;
                    area.classList.add('has-image');
                }
            });

            // Paste image
            document.addEventListener('paste', (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                urlInput.value = ev.target.result;
                                area.innerHTML = `<img src="${ev.target.result}" alt="">`;
                                area.classList.add('has-image');
                            };
                            reader.readAsDataURL(file);
                        }
                    }
                }
            });
        }

        setupImageUpload('addImageInput', 'addImageUrl', 'addImageArea');
        setupImageUpload('editImageInput', 'editImageUrl', 'editImageArea');

        // AI Functions (DeepSeek)
        async function callAI(messages) {
            try {
                const response = await fetch(`${AI_CONFIG.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${AI_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: AI_CONFIG.model,
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `API错误: ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0]?.message?.content || '';
            } catch (err) {
                console.error('AI调用失败:', err);
                throw err;
            }
        }

        async function generateTags() {
            const text = document.getElementById('addText').value;
            if (!text.trim()) {
                showToast('请先输入原始提示词');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" style="width:16px;height:16px;" class="spin"></i> 生成中...';
            lucide.createIcons();

            try {
                const messages = [
                    { role: 'system', content: AI_CONFIG.prompts.generateTags },
                    { role: 'user', content: `根据这个提示词生成标签：${text}` }
                ];

                const result = await callAI(messages);
                const tags = result.replace(/[#\n]/g, '').trim().split(/[,，]/).slice(0, 8).map(t => t.trim()).filter(t => t);
                document.getElementById('addTags').value = tags.join(', ');
                showToast('标签生成成功');
            } catch (err) {
                showToast('生成失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" style="width:16px;height:16px;"></i> AI生成标签';
                lucide.createIcons();
            }
        }

        async function optimizePrompt() {
            const text = document.getElementById('addText').value;
            if (!text.trim()) {
                showToast('请先输入原始提示词');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" style="width:16px;height:16px;" class="spin"></i> 优化中...';
            lucide.createIcons();

            try {
                const messages = [
                    { role: 'system', content: AI_CONFIG.prompts.optimizePrompt },
                    { role: 'user', content: `优化这个提示词：${text}` }
                ];

                const result = await callAI(messages);
                document.getElementById('addTextOptimized').value = result.trim();
                showToast('提示词优化成功');
            } catch (err) {
                showToast('优化失败: ' + err.message);

                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" style="width:16px;height:16px;"></i> AI优化提示词';
                lucide.createIcons();
            }
        }

                id: Date.now(),
                title: document.getElementById('addTitle').value,
                category: document.getElementById('addCategory').value,
                imageType: document.getElementById('addImageType').value,
                image: imgUrl,
                imageWidth: 800, imageHeight: 600,
                source: document.getElementById('addSource').value,
                industry: document.getElementById('addIndustry').value,
                clickRate: document.getElementById('addClickRate').value,
                rating: parseInt(document.getElementById('addRating').value) || 0,
                likes: 0, likedByMe: false,
                tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t),
                text: document.getElementById('addText').value,
                textOptimized: document.getElementById('addTextOptimized').value,
                createdAt: Date.now()
            };

            // Get image dimensions if available
            if (imgUrl && !imgUrl.startsWith('data:')) {
                const img = new Image();
                img.onload = () => {
                    newPrompt.imageWidth = img.width;
                    newPrompt.imageHeight = img.height;
                    prompts.unshift(newPrompt);
                    savePrompts();
                    renderPrompts();
                    e.target.reset();
                    document.getElementById('addImageArea').innerHTML = `<div class="image-upload-text"><i data-lucide="image-plus" style="width:32px;height:32px;"></i></div><div class="image-upload-text">点击上传 / 粘贴图片 / 输入URL</div><div class="image-upload-hint">支持 JPG, PNG 或图片链接</div>`;
                    document.getElementById('addImageArea').classList.remove('has-image');
                    lucide.createIcons();
                    showToast('添加成功');
                    switchTab('list');
                    renderAdminList();
                    updateAdminListCount();
                };
                img.src = imgUrl;
            } else {
                prompts.unshift(newPrompt);
                savePrompts();
                renderPrompts();
                e.target.reset();
                document.getElementById('addImageArea').innerHTML = `<div class="image-upload-text"><i data-lucide="image-plus" style="width:32px;height:32px;"></i></div><div class="image-upload-text">点击上传 / 粘贴图片 / 输入URL</div><div class="image-upload-hint">支持 JPG, PNG 或图片链接</div>`;
                document.getElementById('addImageArea').classList.remove('has-image');
                lucide.createIcons();
                showToast('添加成功');
                switchTab('list');
                renderAdminList();
                updateAdminListCount();
            }
        });

        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('editId').value);
            const index = prompts.findIndex(p => p.id === id);
            if (index === -1) return;

            prompts[index] = {
                ...prompts[index],
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                imageType: document.getElementById('editImageType').value,
                image: document.getElementById('editImageUrl').value,
                source: document.getElementById('editSource').value,
                industry: document.getElementById('editIndustry').value,
                clickRate: document.getElementById('editClickRate').value,
                rating: parseInt(document.getElementById('editRating').value) || 0,
                tags: document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(t => t),
                text: document.getElementById('editText').value,
                textOptimized: document.getElementById('editTextOptimized').value
            };

            savePrompts();
            renderPrompts();
            if (currentDetailId === id) renderDetail(id);
            showToast('保存成功');
            switchTab('list');
            renderAdminList();
            updateAdminListCount();
        });

        document.getElementById('adminBtn').addEventListener('click', openAdminModal);
        document.getElementById('adminModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('adminModal')) closeAdminModal();
        });

        // Init
        loadPrompts();
        initTheme();
        renderPrompts();
        lucide.createIcons();
    </script>
</body>
</html>
