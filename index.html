<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptWorld - 文生图提示词分享站</title>
    <meta name="description" content="精选文生图提示词库，助力AI绘图创作">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f0f23;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --gradient: linear-gradient(135deg, #6366f1, #ec4899);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            background: rgba(15, 15, 35, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: var(--primary);
            font-size: 0.875rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Hero Section */
        .hero {
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px;
            background: radial-gradient(ellipse at top, #1a1a3e 0%, var(--bg) 70%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--primary);
            margin-bottom: 24px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Search & Filter */
        .controls {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-tag {
            padding: 8px 18px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .filter-tag.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }

        /* Prompt Grid */
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .prompt-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .prompt-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .prompt-image {
            width: 100%;
            height: auto;
            aspect-ratio: auto;
            display: block;
            background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
        }

        .prompt-card-body {
            padding: 20px;
        }

        .prompt-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .prompt-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--primary);
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.15);
            border: none;
            border-radius: 6px;
            color: var(--primary);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }

        .copy-btn.copied {
            background: #22c55e;
            color: white;
        }

        .prompt-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .prompt-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            line-height: 1.7;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .prompt-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, var(--card-bg));
        }

        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .prompt-tag {
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .prompt-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .meta-value {
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .meta-value.industry {
            color: var(--secondary);
        }

        .meta-value.source {
            color: var(--primary);
        }

        .meta-value.click-rate {
            color: #22c55e;
        }

        .star-rating {
            display: flex;
            gap: 2px;
        }

        .star-rating i {
            width: 12px;
            height: 12px;
            color: #fbbf24;
        }

        .star-rating i.empty {
            color: rgba(255, 255, 255, 0.15);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: var(--card-bg);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 10px;
            color: #22c55e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--secondary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Admin Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
            max-height: calc(90vh - 140px);
            overflow-y: auto;
        }

        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .admin-tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-tab:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .admin-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            font-family: 'JetBrains Mono', monospace;
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-primary {
            padding: 12px 24px;
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-danger {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #ef4444;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        /* Prompt List in Admin */
        .prompt-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prompt-list-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .prompt-list-item:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .prompt-list-thumb {
            width: 80px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
        }

        .prompt-list-info {
            flex: 1;
            min-width: 0;
        }

        .prompt-list-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prompt-list-category {
            font-size: 0.75rem;
            color: var(--primary);
        }

        .prompt-list-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.15);
            border: none;
            border-radius: 6px;
            color: var(--primary);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .prompt-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .prompt-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .prompt-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats {
                gap: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-logo">PromptWorld</div>
        <button class="admin-btn" onclick="openAdminPanel()">
            <i data-lucide="settings" style="width:16px;height:16px;"></i>
            管理
        </button>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <i data-lucide="sparkles" style="width:16px;height:16px;"></i>
                AI 提示词宝库
            </div>
            <h1>PromptWorld</h1>
            <p>探索精选文生图提示词，激发AI创作灵感。无论你是新手还是专业创作者，这里都能找到适合你的提示词。</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="promptCount">0</div>
                    <div class="stat-label">精选提示词</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">6</div>
                    <div class="stat-label">风格分类</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">∞</div>
                    <div class="stat-label">创作灵感</div>
                </div>
            </div>
        </div>
    </section>

    <div class="controls">
        <div class="search-box">
            <i data-lucide="search" style="width:20px;height:20px;"></i>
            <input type="text" id="searchInput" placeholder="搜索提示词...">
        </div>
        <div class="filter-tags" id="filterTags">
            <button class="filter-tag active" data-filter="all">全部</button>
            <button class="filter-tag" data-filter="photorealistic">写实摄影</button>
            <button class="filter-tag" data-filter="anime">动漫风格</button>
            <button class="filter-tag" data-filter="digital">数字艺术</button>
            <button class="filter-tag" data-filter="illustration">插画风格</button>
            <button class="filter-tag" data-filter="concept">概念艺术</button>
            <button class="filter-tag" data-filter="abstract">抽象艺术</button>
        </div>
    </div>

    <main class="prompt-grid" id="promptGrid"></main>

    <div class="empty-state" id="emptyState" style="display: none;">
        <i data-lucide="search-x" style="width:64px;height:64px;"></i>
        <h3>没有找到匹配的提示词</h3>
        <p>试试其他关键词或筛选条件</p>
    </div>

    <footer>
        <p>Made with ♥ by AI Enthusiasts | <a href="https://github.com" target="_blank">GitHub</a></p>
        <p style="margin-top:10px;opacity:0.6;">免费开源，可随意使用</p>
    </footer>

    <div class="toast" id="toast">
        <i data-lucide="check-circle" style="width:20px;height:20px;"></i>
        <span>已复制到剪贴板</span>
    </div>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <div class="modal-header">
                <h2>管理后台</h2>
                <button class="modal-close" onclick="closeAdminPanel()">
                    <i data-lucide="x" style="width:20px;height:20px;"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="admin-tabs">
                    <button class="admin-tab active" data-tab="list" onclick="switchTab('list')">提示词列表</button>
                    <button class="admin-tab" data-tab="add" onclick="switchTab('add')">添加新提示词</button>
                    <button class="admin-tab" data-tab="edit" onclick="switchTab('edit')" id="editTab" style="display:none;">编辑提示词</button>
                </div>

                <!-- List Tab -->
                <div id="listTab">
                    <div class="prompt-list" id="adminPromptList"></div>
                </div>

                <!-- Add Tab -->
                <div id="addTab" style="display:none;">
                    <form id="addForm">
                        <div class="form-group">
                            <label>封面图片 URL</label>
                            <input type="text" id="addImage" placeholder="https://...">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>标题</label>
                                <input type="text" id="addTitle" placeholder="输入提示词标题" required>
                            </div>
                            <div class="form-group">
                                <label>风格分类</label>
                                <select id="addCategory" required>
                                    <option value="">选择分类</option>
                                    <option value="photorealistic">写实摄影</option>
                                    <option value="anime">动漫风格</option>
                                    <option value="digital">数字艺术</option>
                                    <option value="illustration">插画风格</option>
                                    <option value="concept">概念艺术</option>
                                    <option value="abstract">抽象艺术</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>行业</label>
                                <input type="text" id="addIndustry" placeholder="如：建筑设计">
                            </div>
                            <div class="form-group">
                                <label>来源</label>
                                <input type="text" id="addSource" placeholder="如：Midjourney">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>点击率</label>
                                <input type="text" id="addClickRate" placeholder="如：8.5%">
                            </div>
                            <div class="form-group">

        let prompts = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let editingId = null;

        function loadPrompts() {
            const stored = localStorage.getItem('promptworld_prompts');
            if (stored) {
                prompts = JSON.parse(stored);
            } else {
                prompts = [...DEFAULT_PROMPTS];
                savePrompts();
            }
            document.getElementById('promptCount').textContent = prompts.length;
        }

        function savePrompts() {
            localStorage.setItem('promptworld_prompts', JSON.stringify(prompts));
            document.getElementById('promptCount').textContent = prompts.length;
        }

        function renderPrompts() {
            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            const filtered = prompts.filter(prompt => {
                const matchesFilter = currentFilter === 'all' || prompt.category === currentFilter;
                const matchesSearch = searchQuery === '' ||
                    prompt.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    prompt.text.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (prompt.tags && prompt.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()))) ||
                    (prompt.industry && prompt.industry.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (prompt.source && prompt.source.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = filtered.map(prompt => `
                <article class="prompt-card" data-id="${prompt.id}">
                    <img class="prompt-image" src="${prompt.image || 'https://picsum.photos/800/500?grayscale'}" alt="${prompt.title}"
                         onerror="this.src='https://picsum.photos/800/500?grayscale'">
                    <div class="prompt-card-body">
                        <div class="prompt-card-header">
                            <span class="prompt-category">
                                <i data-lucide="tag" style="width:12px;height:12px;"></i>
                                ${CATEGORY_NAMES[prompt.category] || prompt.category}
                            </span>
                            <button class="copy-btn" onclick="event.stopPropagation(); copyPrompt(${prompt.id})">
                                <i data-lucide="copy" style="width:14px;height:14px;"></i>
                                <span>复制</span>
                            </button>
                        </div>
                        <h3 class="prompt-title">${prompt.title}</h3>
                        <div class="prompt-text">${prompt.text}</div>
                        <div class="prompt-tags">
                            ${(prompt.tags || []).map(tag => `<span class="prompt-tag">#${tag}</span>`).join('')}
                        </div>
                        <div class="prompt-meta">
                            <div class="meta-item">
                                <span class="meta-label">行业</span>
                                <span class="meta-value industry">${prompt.industry || '-'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">来源</span>
                                <span class="meta-value source">${prompt.source || '-'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">点击率</span>
                                <span class="meta-value click-rate">${prompt.clickRate || '-'}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">星级</span>
                                <div class="star-rating">
                                    ${renderStars(prompt.rating || 0)}
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');

            lucide.createIcons();
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += `<i data-lucide="star" style="fill:#fbbf24;"></i>`;
                } else {
                    stars += `<i data-lucide="star" class="empty"></i>`;
                }
            }
            return stars;
        }

        function copyPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            navigator.clipboard.writeText(prompt.text).then(() => {
                const btn = document.querySelector(`.prompt-card[data-id="${id}"] .copy-btn`);
                if (!btn) return;
                btn.classList.add('copied');
                btn.innerHTML = `
                    <i data-lucide="check" style="width:14px;height:14px;"></i>
                    <span>已复制</span>
                `;
                lucide.createIcons();

                showToast();

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `
                        <i data-lucide="copy" style="width:14px;height:14px;"></i>
                        <span>复制</span>
                    `;
                    lucide.createIcons();
                }, 2000);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Admin Panel
        function openAdminPanel() {
            document.getElementById('adminModal').classList.add('show');
            renderAdminList();
            switchTab('list');
        }

        function closeAdminPanel() {
            document.getElementById('adminModal').classList.remove('show');
            editingId = null;
        }

        function switchTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            document.getElementById('listTab').style.display = tab === 'list' ? 'block' : 'none';
            document.getElementById('addTab').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('editTabContent').style.display = tab === 'edit' ? 'block' : 'none';
            document.getElementById('editTab').style.display = tab === 'edit' ? 'inline-block' : 'none';
        }

        function renderAdminList() {
            const list = document.getElementById('adminPromptList');
            list.innerHTML = prompts.map(prompt => `
                <div class="prompt-list-item">
                    <img class="prompt-list-thumb" src="${prompt.image || 'https://picsum.photos/160/100?grayscale'}" alt=""
                         onerror="this.src='https://picsum.photos/160/100?grayscale'">
                    <div class="prompt-list-info">
                        <div class="prompt-list-title">${prompt.title}</div>
                        <div class="prompt-list-category">${CATEGORY_NAMES[prompt.category] || prompt.category}</div>
                    </div>
                    <div class="prompt-list-actions">
                        <button class="btn-edit" onclick="editPrompt(${prompt.id})">编辑</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function editPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            editingId = id;
            switchTab('edit');

            document.getElementById('editId').value = id;
            document.getElementById('editImage').value = prompt.image || '';
            document.getElementById('editTitle').value = prompt.title;
            document.getElementById('editCategory').value = prompt.category;
            document.getElementById('editIndustry').value = prompt.industry || '';
            document.getElementById('editSource').value = prompt.source || '';
            document.getElementById('editClickRate').value = prompt.clickRate || '';
            document.getElementById('editRating').value = prompt.rating || '';
            document.getElementById('editText').value = prompt.text;
            document.getElementById('editTags').value = (prompt.tags || []).join(', ');
        }

        function deletePrompt() {
            if (!editingId) return;
            if (!confirm('确定要删除这个提示词吗？')) return;

            prompts = prompts.filter(p => p.id !== editingId);
            savePrompts();
            renderPrompts();
            closeAdminPanel();
            showToastMessage('已删除');
        }

        // Form Handlers
        document.getElementById('addForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const newPrompt = {
                id: Date.now(),
                title: document.getElementById('addTitle').value,
                category: document.getElementById('addCategory').value,
                industry: document.getElementById('addIndustry').value,
                source: document.getElementById('addSource').value,
                clickRate: document.getElementById('addClickRate').value,
                rating: parseInt(document.getElementById('addRating').value) || 0,
                image: document.getElementById('addImage').value,
                text: document.getElementById('addText').value,
                tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t)
            };

            prompts.unshift(newPrompt);
            savePrompts();
            renderPrompts();

            e.target.reset();
            showToastMessage('添加成功');
        });

        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const id = parseInt(document.getElementById('editId').value);
            const index = prompts.findIndex(p => p.id === id);
            if (index === -1) return;

            prompts[index] = {
                id: id,
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                industry: document.getElementById('editIndustry').value,
                source: document.getElementById('editSource').value,
                clickRate: document.getElementById('editClickRate').value,
                rating: parseInt(document.getElementById('editRating').value) || 0,
                image: document.getElementById('editImage').value,
                text: document.getElementById('editText').value,
                tags: document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(t => t)
            };

            savePrompts();
            renderPrompts();
            closeAdminPanel();
            showToastMessage('保存成功');
        });

        function showToastMessage(msg) {
            const toast = document.getElementById('toast');
            toast.querySelector('span').textContent = msg;
            showToast();
            setTimeout(() => toast.querySelector('span').textContent = '已复制到剪贴板', 3000);
        }

        // Event Listeners
        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelector('.filter-tag.active').classList.remove('active');
                tag.classList.add('active');
                currentFilter = tag.dataset.filter;
                renderPrompts();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPrompts();
        });

        // Close modal on overlay click
        document.getElementById('adminModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeAdminPanel();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPrompts();
            renderPrompts();
            lucide.createIcons();
        });
    </script>
</body>
</html>
