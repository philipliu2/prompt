<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptWorld - 文生图提示词分享站</title>
    <meta name="description" content="精选文生图提示词库，助力AI绘图创作">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f0f23;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --gradient: linear-gradient(135deg, #6366f1, #ec4899);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(ellipse at top, #1a1a3e 0%, var(--bg) 70%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--primary);
            margin-bottom: 24px;
        }

        /* Search & Filter */
        .controls {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-tag {
            padding: 8px 18px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .filter-tag.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }

        /* Prompt Grid */
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .prompt-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .prompt-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .prompt-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .prompt-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--primary);
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(99, 102, 241, 0.15);
            border: none;
            border-radius: 8px;
            color: var(--primary);
            font-size: 0.875rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }

        .copy-btn.copied {
            background: #22c55e;
            color: white;
        }

        .prompt-title {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .prompt-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 10px;
            line-height: 1.8;
            max-height: 150px;
            overflow: hidden;
            position: relative;
        }

        .prompt-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, var(--card-bg));
        }

        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .prompt-tag {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: var(--card-bg);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 10px;
            color: #22c55e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--secondary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .prompt-grid {
                grid-template-columns: 1fr;
            }

            .prompt-card {
                padding: 20px;
            }
        }

        /* Stats Bar */
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <i data-lucide="sparkles" style="width:16px;height:16px;"></i>
                AI 提示词宝库
            </div>
            <h1>PromptWorld</h1>
            <p>探索精选文生图提示词，激发AI创作灵感。无论你是新手还是专业创作者，这里都能找到适合你的提示词。</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="promptCount">20</div>
                    <div class="stat-label">精选提示词</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">6</div>
                    <div class="stat-label">风格分类</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">∞</div>
                    <div class="stat-label">创作灵感</div>
                </div>
            </div>
        </div>
    </section>

    <div class="controls">
        <div class="search-box">
            <i data-lucide="search" style="width:20px;height:20px;"></i>
            <input type="text" id="searchInput" placeholder="搜索提示词...">
        </div>
        <div class="filter-tags" id="filterTags">
            <button class="filter-tag active" data-filter="all">全部</button>
            <button class="filter-tag" data-filter="photorealistic">写实摄影</button>
            <button class="filter-tag" data-filter="anime">动漫风格</button>
            <button class="filter-tag" data-filter="digital">数字艺术</button>
            <button class="filter-tag" data-filter="illustration">插画风格</button>
            <button class="filter-tag" data-filter="concept">概念艺术</button>
            <button class="filter-tag" data-filter="abstract">抽象艺术</button>
        </div>
    </div>

    <main class="prompt-grid" id="promptGrid">
        <!-- Cards will be rendered here -->
    </main>

    <div class="empty-state" id="emptyState" style="display: none;">
        <i data-lucide="search-x" style="width:64px;height:64px;"></i>
        <h3>没有找到匹配的提示词</h3>
        <p>试试其他关键词或筛选条件</p>
    </div>

    <footer>
        <p>Made with ♥ by AI Enthusiasts | <a href="https://github.com" target="_blank">GitHub</a></p>
        <p style="margin-top:10px;opacity:0.6;">免费开源，可随意使用</p>
    </footer>

    <div class="toast" id="toast">
        <i data-lucide="check-circle" style="width:20px;height:20px;"></i>
        <span>已复制到剪贴板</span>
    </div>

    <script>
        const prompts = [
            {
                id: 1,

                tags: ["夜景", "霓虹", "未来城市"]
            },
            {

                categoryName: "动漫风格",
                text: "Studio Ghibli style, peaceful countryside in summer, traditional Japanese house, rice fields, distant mountains, warm golden hour lighting, floating fireflies, detailed background art, peaceful atmosphere",
                tags: ["吉卜力", "夏天", "治愈"]
            },
            {
                id: 3,
                title: "未来数字少女",
                category: "digital",
                categoryName: "数字艺术",
                text: "Digital art portrait of a futuristic girl, holographic accessories, flowing silver hair, iridescent eyes, cyberpunk fashion, glowing circuits on skin, ethereal glow, ultra detailed, 8k resolution",
                tags: ["数字人", "科幻", " portrait"]
            },
            {
                id: 4,
                title: "水彩花卉组合",
                category: "illustration",
                categoryName: "插画风格",
                text: "Watercolor illustration of a bouquet of wildflowers, soft pastel colors, delicate petals, botanical details, white background, visible brushstrokes, artistic style, high quality watercolor paper texture",
                tags: ["水彩", "花卉", "小清新"]
            },
            {
                id: 5,
                title: "蒸汽朋克飞行器",
                category: "concept",
                categoryName: "概念艺术",
                text: "Steampunk airship concept art, brass and copper machinery, Victorian era technology, ornate details, floating in cloudy sky, dramatic sunset lighting, detailed engineering blueprints aesthetic",
                tags: ["蒸汽朋克", "飞行器", "维多利亚"]
            },
            {
                id: 6,
                title: "极光几何抽象",
                category: "abstract",
                categoryName: "抽象艺术",
                text: "Abstract art with flowing aurora borealis patterns, geometric shapes intertwined with organic curves, gradient from deep purple to cyan and green, minimalist composition, museum quality print",
                tags: ["极光", "几何", "极简"]
            },
            {
                id: 7,
                title: "日落海滩肖像",
                category: "photorealistic",
                categoryName: "写实摄影",
                text: "Photorealistic portrait of a woman on tropical beach at sunset, golden hour lighting, wind blown hair, crystal clear turquoise water, coconut trees, shot with Canon EOS R5, 85mm f/1.4",
                tags: ["海滩", "日落", "人像"]
            },
            {
                id: 8,
                title: "新海诚风格雨日",
                category: "anime",
                categoryName: "动漫风格",
                text: "Makoto Shinkai style, rain falling on city streets at night, reflections on wet pavement, warm street lamps, distant skyscrapers, girl with umbrella silhouette, ultra detailed backgrounds",
                tags: ["新海诚", "雨天", "城市"]
            },
            {
                id: 9,
                title: "暗黑天使概念",
                category: "digital",
                categoryName: "数字艺术",
                text: "Dark angel character concept art, broken halo, torn wings revealing mechanical bones, gothic armor, dramatic rim lighting, dark fantasy art style, ultra detailed digital painting",
                tags: ["天使", "暗黑", "角色设计"]
            },
            {
                id: 10,
                title: "扁平化城市插画",
                category: "illustration",
                categoryName: "插画风格",
                text: "Flat design illustration of a modern city skyline, geometric buildings, pastel sunset gradient sky, minimal style, vector art, clean lines, popular on Dribbble, 4k resolution",
                tags: ["扁平", "城市", "矢量"]
            },
            {
                id: 11,
                title: "废墟太空站",
                category: "concept",
                categoryName: "概念艺术",
                text: "Abandoned space station concept art, derelict spacecraft, alien planet visible through broken windows, dust particles floating in moonlight, volumetric fog, sci-fi environment art",
                tags: ["太空", "废墟", "科幻"]
            },
            {
                id: 12,
                title: "分形宇宙漩涡",
                category: "abstract",
                categoryName: "抽象艺术",
                text: "Abstract fractal art, infinite recursive patterns, mandala-like vortex, cosmic scale, deep blacks with vibrant neon accents, hypnotic detail, mathematically precise",
                tags: ["分形", "曼陀罗", "宇宙"]
            },
            {
                id: 13,
                title: "复古胶片咖啡馆",
                category: "photorealistic",
                categoryName: "写实摄影",
                text: "Vintage film photography of a cozy coffee shop interior, warm tungsten lighting, exposed brick walls, wooden furniture, steam rising from coffee cups, shot on Kodak Portra 400, grain visible",
                tags: ["咖啡馆", "复古", "胶片"]
            },
            {
                id: 14,
                title: "异世界传送门",
                category: "anime",
                categoryName: "动漫风格",
                text: "Anime style portal to another world, swirling magical vortex, glowing runes, mysterious forest on the other side, starlight reflections, fantasy adventure manga cover art style",
                tags: ["魔法", "传送门", "异世界"]
            },
            {
                id: 15,
                title: "赛博格机械手臂",
                category: "digital",
                categoryName: "数字艺术",
                text: "Hyperrealistic cyberpunk prosthetic arm, exposed mechanical joints, synthetic skin interface, LED indicators, chrome and titanium materials, dramatic product photography lighting",
                tags: ["赛博格", "机械", "义体"]
            },
            {
                id: 16,
                title: "和风妖怪浮世绘",
                category: "illustration",
                categoryName: "插画风格",
                text: "Japanese ukiyo-e style illustration of mythical yokai spirits, traditional woodblock print aesthetic, mount fuji background, cherry blossoms, ghostly apparition, Edo period art revival",
                tags: ["浮世绘", "妖怪", "和风"]
            },
            {
                id: 17,
                title: "深海潜水艇内部",
                category: "concept",
                categoryName: "概念艺术",
                text: "Interior concept art of a submarine control room, vintage nautical equipment, analog gauges, flickering emergency lights, porthole showing deep ocean darkness, dramatic chiaroscuro lighting",
                tags: ["潜水艇", "深海", "复古科幻"]
            },
            {
                id: 18,
                title: "液态金属变形",
                category: "abstract",
                categoryName: "抽象艺术",
                text: "Abstract visualization of liquid metal morphing, mercury-like surface, reflective chrome, morphing organic shapes, dark background, high contrast, minimalist composition",
                tags: ["液态", "金属", "变形"]
            },
            {
                id: 19,
                title: "野生动物特写",
                category: "photorealistic",
                categoryName: "写实摄影",
                text: "Wild lion portrait close-up, golden savanna background, intense eyes, detailed mane texture, natural warm lighting, captured with 600mm telephoto lens, wildlife photography award style",
                tags: ["狮子", "野生动物", "自然"]
            },
            {
                id: 20,
                title: "樱花树下的猫",
                category: "anime",
                categoryName: "动漫风格",
                text: "Anime illustration of a fluffy cat sitting under a blooming cherry blossom tree, falling petals, soft pink and white color palette, kawaii style, Studio Ghibli influenced, peaceful spring scene",
                tags: ["猫", "樱花", "可爱"]
            }
        ];

        let currentFilter = 'all';
        let searchQuery = '';

        function renderPrompts() {
            const grid = document.getElementById('promptGrid');
            const emptyState = document.getElementById('emptyState');

            const filtered = prompts.filter(prompt => {
                const matchesFilter = currentFilter === 'all' || prompt.category === currentFilter;
                const matchesSearch = searchQuery === '' ||
                    prompt.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    prompt.text.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    prompt.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = filtered.map(prompt => `
                <article class="prompt-card" data-id="${prompt.id}">
                    <div class="prompt-card-header">
                        <span class="prompt-category">
                            <i data-lucide="tag" style="width:12px;height:12px;"></i>
                            ${prompt.categoryName}
                        </span>
                        <button class="copy-btn" onclick="event.stopPropagation(); copyPrompt(${prompt.id})">
                            <i data-lucide="copy" style="width:16px;height:16px;"></i>
                            <span>复制</span>
                        </button>
                    </div>
                    <h3 class="prompt-title">${prompt.title}</h3>
                    <div class="prompt-text">${prompt.text}</div>
                    <div class="prompt-tags">
                        ${prompt.tags.map(tag => `<span class="prompt-tag">#${tag}</span>`).join('')}
                    </div>
                </article>
            `).join('');

            lucide.createIcons();
        }

        function copyPrompt(id) {
            const prompt = prompts.find(p => p.id === id);
            if (!prompt) return;

            navigator.clipboard.writeText(prompt.text).then(() => {
                const btn = document.querySelector(`[data-id="${id}"] .copy-btn`);
                btn.classList.add('copied');
                btn.innerHTML = `
                    <i data-lucide="check" style="width:16px;height:16px;"></i>
                    <span>已复制</span>
                `;
                lucide.createIcons();

                showToast();

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `
                        <i data-lucide="copy" style="width:16px;height:16px;"></i>
                        <span>复制</span>
                    `;
                    lucide.createIcons();
                }, 2000);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Event Listeners
        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelector('.filter-tag.active').classList.remove('active');
                tag.classList.add('active');
                currentFilter = tag.dataset.filter;
                renderPrompts();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPrompts();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPrompts();
            lucide.createIcons();
        });
    </script>
</body>
</html>
